    const contentMain = document.getElementById('content-main');
    const menuToggle = document.getElementById('menuToggle');
    const mobileMenuWrapper = document.getElementById('mobileMenuWrapper');
    const menuBackdrop = document.getElementById('menuBackdrop');
    const searchBox = document.getElementById('searchBox');
    const DEFAULT_TOOL_ID = 'text-process';

    // 收藏工具数据（使用 localStorage 记录）
    const FAVORITES_KEY = 'tool-favorites';

    const DEFAULT_HEADER_COUNT = 6;

    function getHeaderTools() {
        const favorites = getFavorites();
        if (favorites.length > 0) {
            const favTools = MENU_ITEMS.filter(item => favorites.includes(item.id));
            if (favTools.length < DEFAULT_HEADER_COUNT) {
                const favIds = new Set(favorites);
                const backfill = MENU_ITEMS
                    .filter(item => !favIds.has(item.id))
                    .slice(0, DEFAULT_HEADER_COUNT - favTools.length);
                return [...favTools, ...backfill];
            }
            return favTools;
        }
        return MENU_ITEMS.slice(0, DEFAULT_HEADER_COUNT);
    }

    function getDropdownTools() {
        const headerTools = getHeaderTools();
        const headerIds = new Set(headerTools.map(t => t.id));
        const base = MENU_ITEMS.filter(item => !headerIds.has(item.id));
        const overflow = overflowIds.map(id => MENU_ITEMS.find(item => item.id === id)).filter(Boolean);
        return [...overflow, ...base];
    }

    function renderHeaderTabs() {
        const headerTabs = document.getElementById('headerTabs');
        headerTabs.innerHTML = '';
        const tools = getHeaderTools();

        tools.forEach(item => {
            const div = document.createElement('div');
            div.className = 'tab-item';
            div.dataset.keywords = item.keywords;

            const a = document.createElement('a');
            a.href = '#' + item.id;
            a.setAttribute('data-id', item.id);
            a.setAttribute('data-src', item.src);
            a.innerHTML = `<i class="fas ${item.icon}"></i>${item.name}`;

            const favBtn = document.createElement('button');
            favBtn.className = 'favorite-btn' + (getFavorites().includes(item.id) ? ' active' : '');
            favBtn.innerHTML = '<i class="fas fa-star"></i>';
            favBtn.title = '取消收藏';
            favBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                toggleFavorite(item.id);
                rebuildAllMenus();
            });

            div.appendChild(a);
            div.appendChild(favBtn);
            headerTabs.appendChild(div);
        });
    }

    function renderDropdown() {
        const dropdown = document.getElementById('moreDropdown');
        const badge = document.getElementById('moreBadge');
        dropdown.innerHTML = '';
        const tools = getDropdownTools();

        badge.textContent = tools.length;

        const moreWrapper = document.getElementById('moreWrapper');
        if (tools.length === 0) {
            moreWrapper.style.display = 'none';
        } else {
            moreWrapper.style.display = '';
        }

        tools.forEach(item => {
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            div.setAttribute('role', 'menuitem');
            div.setAttribute('data-id', item.id);
            div.setAttribute('data-src', item.src);
            div.dataset.keywords = item.keywords;

            const icon = document.createElement('i');
            icon.className = 'fas ' + item.icon;

            const name = document.createElement('span');
            name.className = 'item-name';
            name.textContent = item.name;

            const favBtn = document.createElement('button');
            favBtn.className = 'dropdown-fav-btn' + (getFavorites().includes(item.id) ? ' active' : '');
            favBtn.innerHTML = getFavorites().includes(item.id) ? '★' : '☆';
            favBtn.title = '收藏';
            favBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                toggleFavorite(item.id);
                rebuildAllMenus();
            });

            div.appendChild(icon);
            div.appendChild(name);
            div.appendChild(favBtn);

            div.addEventListener('click', function(e) {
                if (e.target.closest('.dropdown-fav-btn')) return;
                switchTool(item.id);
                toggleDropdown(false);
            });

            dropdown.appendChild(div);
        });
    }

    function renderMobileMenu() {
        const mobileList = document.getElementById('mobileMenuList');
        if (!mobileList) return;
        mobileList.innerHTML = '';

        const headerTools = getHeaderTools();
        const dropdownTools = getDropdownTools();
        const favorites = getFavorites();

        const favTitle = document.createElement('li');
        favTitle.className = 'mobile-section-title';
        favTitle.innerHTML = '<span class="star">★</span> 收藏工具';
        mobileList.appendChild(favTitle);

        headerTools.forEach(item => {
            mobileList.appendChild(createMobileMenuItem(item, favorites));
        });

        if (dropdownTools.length > 0) {
            const divider = document.createElement('li');
            divider.className = 'mobile-section-divider';
            mobileList.appendChild(divider);

            const otherTitle = document.createElement('li');
            otherTitle.className = 'mobile-section-title';
            otherTitle.textContent = '其他工具';
            mobileList.appendChild(otherTitle);

            dropdownTools.forEach(item => {
                mobileList.appendChild(createMobileMenuItem(item, favorites));
            });
        }
    }

    function createMobileMenuItem(item, favorites) {
        const li = document.createElement('li');
        li.className = 'menu-item';
        li.dataset.keywords = item.keywords;

        const a = document.createElement('a');
        a.href = '#' + item.id;
        a.setAttribute('data-id', item.id);
        a.setAttribute('data-src', item.src);
        a.innerHTML = `<i class="fas ${item.icon}"></i><span>${item.name}</span>`;

        const favBtn = document.createElement('button');
        favBtn.className = 'mobile-fav-btn' + (favorites.includes(item.id) ? ' active' : '');
        favBtn.textContent = favorites.includes(item.id) ? '★' : '☆';
        favBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleFavorite(item.id);
            rebuildAllMenus();
        });

        a.appendChild(favBtn);
        li.appendChild(a);
        return li;
    }

    // 获取收藏列表
    function getFavorites() {
        const favorites = localStorage.getItem(FAVORITES_KEY);
        return favorites ? JSON.parse(favorites) : [];
    }

    // 保存收藏列表
    function saveFavorites(favorites) {
        localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
    }

    // 切换收藏状态
    function toggleFavorite(toolId) {
        let favorites = getFavorites();
        const index = favorites.indexOf(toolId);

        if (index > -1) {
            favorites.splice(index, 1); // 取消收藏
        } else {
            favorites.push(toolId); // 添加收藏
        }

        saveFavorites(favorites);
    }

    let visibleLinksCache = [];
    let selectedVisibleIndex = -1;

    function getVisibleLinks() {
        const tabLinks = Array.from(document.querySelectorAll('#headerTabs .tab-item a:not(.search-dimmed)'));
        const dropdown = document.getElementById('moreDropdown');
        const dropdownOpen = dropdown.classList.contains('open');
        const dropdownLinks = dropdownOpen ? Array.from(document.querySelectorAll('#moreDropdown .dropdown-item:not(.hidden)')) : [];
        return [...tabLinks, ...dropdownLinks];
    }

    function applySelectedLinkStyle() {
        document.querySelectorAll('#headerTabs .tab-item a.search-selected').forEach(a => {
            a.classList.remove('search-selected');
        });
        document.querySelectorAll('#moreDropdown .dropdown-item.search-selected').forEach(item => {
            item.classList.remove('search-selected');
        });
        if (selectedVisibleIndex >= 0 && selectedVisibleIndex < visibleLinksCache.length) {
            visibleLinksCache[selectedVisibleIndex].classList.add('search-selected');
        }
    }

    function refreshVisibleLinks(keepSelection = false) {
        const previousLink = keepSelection && selectedVisibleIndex >= 0 ? visibleLinksCache[selectedVisibleIndex] : null;
        visibleLinksCache = getVisibleLinks();
        if (visibleLinksCache.length === 0) {
            selectedVisibleIndex = -1;
            applySelectedLinkStyle();
            return;
        }

        if (previousLink) {
            const nextIndex = visibleLinksCache.indexOf(previousLink);
            if (nextIndex >= 0) {
                selectedVisibleIndex = nextIndex;
            } else {
                selectedVisibleIndex = 0;
            }
        } else {
            selectedVisibleIndex = 0;
        }
        applySelectedLinkStyle();
    }

    function moveSelection(step) {
        if (!visibleLinksCache.length) return;
        if (selectedVisibleIndex < 0 || selectedVisibleIndex >= visibleLinksCache.length) {
            selectedVisibleIndex = 0;
        } else {
            selectedVisibleIndex = (selectedVisibleIndex + step + visibleLinksCache.length) % visibleLinksCache.length;
        }
        applySelectedLinkStyle();
        visibleLinksCache[selectedVisibleIndex].scrollIntoView({
            behavior: 'smooth',
            block: 'nearest',
            inline: 'nearest'
        });
    }

    function toggleDropdown(force) {
        const dropdown = document.getElementById('moreDropdown');
        const btn = document.getElementById('moreBtn');
        const shouldOpen = typeof force === 'boolean' ? force : !dropdown.classList.contains('open');
        dropdown.classList.toggle('open', shouldOpen);
        btn.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    function syncActiveState(activeToolId) {
        if (!activeToolId) {
            const hash = window.location.hash.replace('#', '');
            activeToolId = hash || DEFAULT_TOOL_ID;
        }
        document.querySelectorAll('#headerTabs .tab-item a').forEach(a => {
            a.classList.toggle('active', a.getAttribute('data-id') === activeToolId);
        });
        document.querySelectorAll('#moreDropdown .dropdown-item').forEach(item => {
            item.classList.toggle('active', item.getAttribute('data-id') === activeToolId);
        });
        document.querySelectorAll('#mobileMenuList .menu-item a').forEach(a => {
            a.classList.toggle('active', a.getAttribute('data-id') === activeToolId);
        });
    }

    function rebuildAllMenus() {
        renderHeaderTabs();
        renderDropdown();
        renderMobileMenu();
        handleOverflow();
        syncActiveState();
        updateVisibility();
    }

    let overflowIds = [];
    function handleOverflow() {
        if (window.innerWidth <= 768) { overflowIds = []; return; }

        const headerTabs = document.getElementById('headerTabs');
        const tabs = Array.from(headerTabs.querySelectorAll('.tab-item'));

        tabs.forEach(tab => tab.style.display = '');
        overflowIds = [];

        if (headerTabs.scrollWidth <= headerTabs.clientWidth) return;

        for (let i = tabs.length - 1; i >= 0; i--) {
            if (headerTabs.scrollWidth <= headerTabs.clientWidth) break;
            tabs[i].style.display = 'none';
            overflowIds.push(tabs[i].querySelector('a').getAttribute('data-id'));
        }

        if (overflowIds.length > 0) { renderDropdown(); }
    }

    function setMenuOpen(open) {
        const mobile = window.innerWidth <= 768;
        const shouldOpen = Boolean(open && mobile);
        mobileMenuWrapper.classList.toggle('active', shouldOpen);
        menuBackdrop.classList.toggle('active', shouldOpen);
        document.body.classList.toggle('menu-open', shouldOpen);
        menuToggle.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    function updateVisibility() {
        const keyword = searchBox.value.toLowerCase().trim();

        document.querySelectorAll('#headerTabs .tab-item').forEach(item => {
            const text = item.textContent.toLowerCase();
            const keywords = (item.dataset.keywords || '').toLowerCase();
            const match = !keyword || text.includes(keyword) || keywords.includes(keyword);
            const link = item.querySelector('a');
            if (link) { link.classList.toggle('search-dimmed', !match && !!keyword); }
        });

        document.querySelectorAll('#moreDropdown .dropdown-item').forEach(item => {
            const text = item.textContent.toLowerCase();
            const keywords = (item.dataset.keywords || '').toLowerCase();
            const match = !keyword || text.includes(keyword) || keywords.includes(keyword);
            item.classList.toggle('hidden', !match && !!keyword);
        });

        document.querySelectorAll('#mobileMenuList .menu-item').forEach(item => {
            const text = item.textContent.toLowerCase();
            const keywords = (item.dataset.keywords || '').toLowerCase();
            const match = !keyword || text.includes(keyword) || keywords.includes(keyword);
            item.style.display = (!match && !!keyword) ? 'none' : '';
        });

        refreshVisibleLinks(true);
    }

    searchBox.addEventListener('input', function() {
        const keyword = this.value.trim();
        if (keyword) {
            if (window.innerWidth <= 768) { setMenuOpen(true); }
            else { toggleDropdown(true); }
        } else {
            if (window.innerWidth > 768) { toggleDropdown(false); }
        }
        updateVisibility();
    });

    searchBox.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); moveSelection(1); return; }
        if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); moveSelection(-1); return; }
        if (e.key === 'Enter') {
            const keyword = this.value.trim();
            if (!keyword) return;
            refreshVisibleLinks(true);
            if (selectedVisibleIndex < 0 || selectedVisibleIndex >= visibleLinksCache.length) return;
            const selected = visibleLinksCache[selectedVisibleIndex];
            const toolId = selected.getAttribute('data-id');
            if (toolId) { switchTool(toolId); toggleDropdown(false); this.value = ''; updateVisibility(); }
        }
    });

    // 快捷键：Windows Ctrl+K / macOS ⌘+K 聚焦搜索框
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            toggleDropdown(false);
            return;
        }
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
            e.preventDefault();
            searchBox.focus();
            searchBox.select();
        }
    });

    // iframe 内的键盘事件不会冒泡到父页面，需要通过 postMessage 桥接
    window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'focusParentSearch') {
            searchBox.focus();
            searchBox.select();
        }
    });

    // 向同源 iframe 注入 Cmd+K 监听，转发给父页面
    function injectShortcutBridge(iframe) {
        try {
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            if (!iframeDoc) return;
            iframeDoc.addEventListener('keydown', function (e) {
                if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
                    e.preventDefault();
                    window.parent.postMessage({ type: 'focusParentSearch' }, '*');
                }
            });
        } catch (err) {
            // 跨域 iframe 无法注入，忽略
        }
    }

    // 监听所有 iframe 的 load 事件
    const observer = new MutationObserver(function (mutations) {
        for (const mutation of mutations) {
            for (const node of mutation.addedNodes) {
                if (node.tagName === 'IFRAME') {
                    node.addEventListener('load', function () {
                        injectShortcutBridge(node);
                    });
                }
            }
        }
    });
    observer.observe(contentMain, { childList: true });

    function switchTool(toolId) {
        const item = MENU_ITEMS.find(i => i.id === toolId) || (getExtensionToolConfig(toolId));
        if (!item) return;

        const src = item.src;
        syncActiveState(toolId);

        const allIframes = document.querySelectorAll('.tool-iframe');
        allIframes.forEach(iframe => {
            iframe.classList.remove('active');
            iframe.style.display = 'none';
        });

        let targetIframe = document.querySelector(`.tool-iframe[data-id="${toolId}"]`);
        if (!targetIframe) {
            targetIframe = document.createElement('iframe');
            targetIframe.className = 'tool-iframe';
            targetIframe.setAttribute('data-id', toolId);
            targetIframe.setAttribute('title', item.name);
            targetIframe.src = src;
            contentMain.appendChild(targetIframe);
        }

        targetIframe.style.display = 'block';
        requestAnimationFrame(() => {
            requestAnimationFrame(() => { targetIframe.classList.add('active'); });
        });

        if (window.location.hash !== '#' + toolId) {
            history.pushState(null, null, '#' + toolId);
        }
        if (window.innerWidth <= 768) { setMenuOpen(false); }

        const isNewIframe = !targetIframe.dataset.loaded;
        if (isNewIframe) {
            targetIframe.addEventListener('load', function () {
                targetIframe.dataset.loaded = '1';
                focusFirstInput(targetIframe);
            }, { once: true });
        } else {
            setTimeout(() => focusFirstInput(targetIframe), 80);
        }
    }

    function focusFirstInput(iframe) {
        try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            if (!doc) return;
            const selectors = [
                'input[type="text"]:not([disabled]):not([hidden])',
                'input[type="search"]:not([disabled]):not([hidden])',
                'textarea:not([disabled]):not([hidden])',
                'input:not([type]):not([disabled]):not([hidden])',
                'select:not([disabled]):not([hidden])'
            ];
            for (const sel of selectors) {
                const el = doc.querySelector(sel);
                if (el && el.offsetParent !== null) {
                    iframe.focus();
                    el.focus();
                    return;
                }
            }
        } catch (e) {
            // 跨域 iframe 无法访问，静默失败
        }
    }

    // 监听 URL 变化
    window.addEventListener('hashchange', () => {
        const toolId = window.location.hash.replace('#', '');
        if (toolId) switchTool(toolId);
    });

    window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'switchTool') {
            const { toolId } = e.data;
            if (toolId) {
                const existingItem = MENU_ITEMS.find(item => item.id === toolId);
                if (!existingItem) {
                    const extensionTool = getExtensionToolConfig(toolId);
                    if (extensionTool) {
                        MENU_ITEMS.push(extensionTool);
                        rebuildAllMenus();
                    }
                }
                switchTool(toolId);
            }
        }
    });

    // 获取扩展工具配置（用于"其他工具"页面内的工具跳转）
    function getExtensionToolConfig(toolId) {
        const extensionTools = [
            {
                id: 'todo',
                name: '待办清单',
                src: 'todo.html?embed=1',
                keywords: 'todo 待办 清单 任务 task 计划 daibanqingdan',
                category: '其他',
                icon: 'fa-list-check'
            },
            {
                id: 'map',
                name: '地图工具',
                src: 'map/index.html',
                keywords: '地图 世界地图 可视化 map 地图工具',
                category: '其他',
                icon: 'fa-map'
            }
        ];
        return extensionTools.find(tool => tool.id === toolId);
    }

    menuToggle.addEventListener('click', function () {
        setMenuOpen(!mobileMenuWrapper.classList.contains('active'));
    });

    document.getElementById('moreBtn').addEventListener('click', function (e) {
        e.stopPropagation();
        toggleDropdown();
    });

    document.addEventListener('click', function (e) {
        const moreWrapper = document.getElementById('moreWrapper');
        if (moreWrapper && !moreWrapper.contains(e.target)) {
            toggleDropdown(false);
        }
        if (window.innerWidth <= 768 && !menuToggle.contains(e.target) && !mobileMenuWrapper.contains(e.target)) {
            setMenuOpen(false);
        }
    });

    menuBackdrop.addEventListener('click', function () {
        setMenuOpen(false);
    });

    document.getElementById('headerTabs').addEventListener('click', function(e) {
        const link = e.target.closest('.tab-item a');
        if (!link) return;
        e.preventDefault();
        switchTool(link.getAttribute('data-id'));
    });

    document.getElementById('mobileMenuList').addEventListener('click', function(e) {
        const link = e.target.closest('.menu-item a');
        if (!link || e.target.closest('.mobile-fav-btn')) return;
        e.preventDefault();
        switchTool(link.getAttribute('data-id'));
    });

    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            setMenuOpen(false);
            rebuildAllMenus();
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        rebuildAllMenus();
        refreshVisibleLinks(true);
        const hashId = window.location.hash.replace('#', '');

        if (hashId) {
            const existingItem = MENU_ITEMS.find(item => item.id === hashId);
            if (!existingItem) {
                const extensionTool = getExtensionToolConfig(hashId);
                if (extensionTool) {
                    MENU_ITEMS.push(extensionTool);
                    rebuildAllMenus();
                }
            }
        }

        switchTool(hashId || DEFAULT_TOOL_ID);
    });
</script>
