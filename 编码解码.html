<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全能信息编解码工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#165DFF',
                            hover: '#0E42D2',
                            light: '#E8F3FF'
                        },
                        secondary: '#36CFC9',
                        success: '#52C41A',
                        warning: '#FAAD14',
                        danger: '#FF4D4F',
                        dark: '#1D2129',
                        gray: {
                            50: '#F7F8FA',
                            100: '#F2F3F5',
                            200: '#E5E6EB',
                            400: '#86909C',
                            600: '#4E5969'
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 12px 0 rgba(0,0,0,0.05)',
                        'xl-soft': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)',
                        'button': '0 4px 12px rgba(22, 93, 255, 0.15)',
                        'button-hover': '0 6px 16px rgba(22, 93, 255, 0.25)',
                    },
                    animation: {
                        'bounce-slow': 'bounce 2s infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .custom-scrollbar::-webkit-scrollbar {
                width: 6px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #E5E6EB;
                border-radius: 10px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover {
                background: #C9CDD4;
            }
            .func-btn-active {
                @apply bg-primary text-white shadow-md transform -translate-y-0.5;
            }
            .glass-header {
                backdrop-filter: blur(10px);
                background-color: rgba(255, 255, 255, 0.8);
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1;
            }
            .btn-primary-hover {
                @apply transition-all duration-200 hover:shadow-md hover:-translate-y-0.5 active:translate-y-0 active:shadow-sm;
            }
            .btn-secondary-hover {
                @apply transition-all duration-200 hover:shadow-sm hover:-translate-y-0.5 active:translate-y-0;
            }
            .input-focus {
                @apply focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200;
            }
            .tab-active {
                @apply bg-white shadow-md text-primary transform -translate-y-0.5;
            }
            .gradient-bg {
                background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            }
            .opacity-0 {
                opacity: 0;
                transition: opacity 0.2s ease-in-out;
            }
            .json-tree-panel {
                border-top: 1px solid #E5E6EB;
                background: #FAFBFF;
            }
            .json-tree {
                font-family: "Cascadia Code", "Consolas", monospace;
                font-size: 13px;
                line-height: 1.7;
                color: #334155;
                max-height: 280px;
                overflow: auto;
            }
            .json-tree .fe-key { color: #2563eb; font-weight: 500; }
            .json-tree .fe-string { color: #059669; }
            .json-tree .fe-number { color: #d97706; font-weight: 500; }
            .json-tree .fe-boolean { color: #7c3aed; font-weight: 600; }
            .json-tree .fe-null { color: #94a3b8; font-style: italic; }
            .json-tree .fe-bracket { color: #64748b; }
            .json-tree .fe-highlight { background-color: rgba(67, 97, 238, 0.05); border-radius: 4px; }
            .json-tree .fe-toggle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 18px;
                height: 18px;
                margin-right: 6px;
                font-size: 10px;
                background: #f1f5f9;
                border-radius: 4px;
                cursor: pointer;
                color: #64748b;
                user-select: none;
                border: 1px solid #E2E8F0;
                transition: all 0.2s ease;
            }
            .json-tree .fe-toggle:hover {
                background: #165DFF;
                color: #fff;
                border-color: #165DFF;
            }
            .json-tree .fe-tree-children {
                border-left: 1px solid rgba(67, 97, 238, 0.12);
                margin-left: 8px;
            }
            /* 关闭悬浮位移动效，避免鼠标移入时元素跳动 */
            .card-hover:hover,
            .btn-primary-hover:hover,
            .btn-secondary-hover:hover,
            .func-btn:hover,
            #copySingleBtn:hover,
            #expandJsonBtn:hover,
            #collapseJsonBtn:hover {
                transform: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-dark font-sans min-h-screen flex flex-col antialiased">

<!-- 导航栏 -->
<header class="glass-header border-b border-gray-100 sticky top-0 z-50 shadow-sm">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center shadow-md transition-all hover:shadow-lg hover:scale-105">
                <svg class="w-5.5 h-5.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <h1 class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-blue-400">
                全能编解码
            </h1>
        </div>
        <div class="flex gap-3">
            <button id="clearBtn" class="px-3 py-1.5 md:px-4 md:py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg btn-secondary-hover">
                清空内容
            </button>
            <button id="copyResultBtn" class="px-3 py-1.5 md:px-4 md:py-2 text-sm font-medium bg-primary text-white hover:bg-primary-hover rounded-lg shadow-md btn-primary-hover">
                复制结果
            </button>
        </div>
    </div>
</header>

<main class="flex-grow container mx-auto px-4 py-6 max-w-7xl">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

        <!-- 输入区 (4/12) -->
        <div class="lg:col-span-4 flex flex-col">
            <div class="bg-white rounded-2xl shadow-soft border border-gray-100 overflow-hidden flex flex-col h-full card-hover">
                <div class="px-5 py-4 border-b border-gray-50 flex items-center justify-between bg-gradient-to-r from-gray-50 to-white">
                    <span class="font-semibold text-gray-700 text-base">源内容输入</span>
                    <span class="text-xs text-gray-400 font-mono bg-gray-100 px-2.5 py-1 rounded-full" id="inputCharCount">0 chars</span>
                </div>
                <textarea
                        id="inputText"
                        class="flex-grow w-full p-4 text-sm md:text-base border-none focus:ring-0 resize-none min-h-[200px] lg:min-h-[600px] custom-scrollbar input-focus"
                        placeholder="在此贴入需要处理的原始文本..."></textarea>
            </div>
        </div>

        <!-- 操作与结果区 (8/12) -->
        <div class="lg:col-span-8 flex flex-col gap-6">

            <!-- 功能选择卡 -->
            <div class="bg-white rounded-2xl shadow-soft border border-gray-100 overflow-hidden card-hover">
                <div class="flex p-1 bg-gray-50 m-3 rounded-xl">
                    <button id="encryptTab" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-white shadow-md text-primary tab-active">
                        加密 / 编码
                    </button>
                    <button id="decryptTab" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-gray-400 hover:text-gray-600 hover:bg-white/50">
                        解密 / 解码
                    </button>
                </div>

                <div class="p-4 pt-2">
                    <!-- 加密列表 -->
                    <div id="encryptFunctions" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5">
                        <button data-func="unicodeEncode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">Unicode(\u)</span>
                        </button>
                        <button data-func="urlEncode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">URL编码(%)</span>
                        </button>
                        <button data-func="utf16Encode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">UTF16(\x)</span>
                        </button>
                        <button data-func="base64Encode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors font-semibold">Base64编码</span>
                        </button>
                        <button data-func="md5Compute" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors font-bold text-secondary">MD5</span>
                        </button>
                        <button data-func="hexEncode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">HEX 十六进制</span>
                        </button>
                        <button data-func="sha1Encrypt" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">Sha1</span>
                        </button>
                        <button data-func="htmlNormalEncode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">HTML实体</span>
                        </button>
                        <button data-func="htmlDeepEncode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">HTML深度</span>
                        </button>
                        <button data-func="htmlToJs" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">HTML转JS</span>
                        </button>
                        <button data-func="gzipCompress" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors font-bold italic text-blue-600">Gzip压缩</span>
                        </button>
                        <button data-func="gb2312Encode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-primary-light border border-transparent hover:border-primary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-primary transition-colors">GB2312编码</span>
                        </button>
                    </div>

                    <!-- 解密列表 -->
                    <div id="decryptFunctions" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5">
                        <button data-func="unicodeDecode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors">Unicode解码</span>
                        </button>
                        <button data-func="urlDecode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors font-semibold">URL解码</span>
                        </button>
                        <button data-func="utf16Decode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors">UTF16解码</span>
                        </button>
                        <button data-func="base64Decode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors font-semibold">Base64解码</span>
                        </button>
                        <button data-func="hexDecode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors font-semibold">HEX解码</span>
                        </button>
                        <button data-func="htmlEntityDecode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors">HTML反转义</span>
                        </button>
                        <button data-func="urlParamsParse" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors">URL参数解析</span>
                        </button>
                        <button data-func="jwtDecode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors font-bold text-orange-500">JWT解析</span>
                        </button>
                        <button data-func="cookieFormat" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors">Cookie格式化</span>
                        </button>
                        <button data-func="gzipDecompress" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors font-bold italic">Gzip解压</span>
                        </button>
                        <button data-func="gb2312Decode" class="func-btn group p-2.5 text-xs md:text-sm bg-gray-50 hover:bg-secondary/10 border border-transparent hover:border-secondary/20 rounded-xl transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span class="block text-gray-600 group-hover:text-secondary transition-colors">GB2312解码</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 结果区 -->
            <div class="bg-white rounded-2xl shadow-xl-soft border border-gray-100 flex-grow flex flex-col min-h-[350px] card-hover">
                <div class="px-5 py-4 border-b border-gray-50 flex items-center justify-between bg-gradient-to-r from-gray-50 to-white">
                    <div class="flex items-center gap-2">
                        <span class="font-semibold text-gray-700 text-base">处理结果</span>
                        <span id="resultStatus" class="px-2.5 py-1 bg-white border border-gray-200 text-[10px] md:text-xs rounded-full shadow-sm text-gray-400">等待操作</span>
                    </div>
                    <button id="copySingleBtn" class="p-2 text-gray-400 hover:text-primary transition-colors active:scale-90 transform hover:scale-105">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    </button>
                </div>
                <textarea
                        id="resultText"
                        class="flex-grow w-full p-4 text-sm md:text-base font-mono border-none focus:ring-0 resize-none bg-transparent custom-scrollbar input-focus"
                        placeholder="此处显示处理后的结果..." readonly></textarea>
                <div id="resultJsonPanel" class="json-tree-panel hidden">
                    <div class="px-4 py-2 flex items-center justify-between">
                        <span class="text-xs text-gray-500">JSON树视图</span>
                        <div class="flex items-center gap-2">
                            <button id="expandJsonBtn" class="px-2 py-1 text-xs border border-gray-200 rounded-md text-gray-600 hover:text-primary hover:border-primary/40 transition-colors">全部展开</button>
                            <button id="collapseJsonBtn" class="px-2 py-1 text-xs border border-gray-200 rounded-md text-gray-600 hover:text-primary hover:border-primary/40 transition-colors">全部折叠</button>
                        </div>
                    </div>
                    <div id="resultJsonTree" class="json-tree px-4 pb-4 custom-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="py-6 border-t border-gray-100 bg-white">
    <div class="container mx-auto px-4 text-center">
        <p class="text-gray-400 text-sm italic">全能信息编解码工具 | 极速 · 安全 · 离线可用</p>
    </div>
</footer>

<!-- 脚本依赖 (保持不变) -->
<script src="https://jsd.onmicrosoft.cn/npm/js-md5@0.7.3/src/md5.min.js"></script>
<script src="https://jsd.onmicrosoft.cn/npm/js-sha1/build/sha1.min.js"></script>
<script src="https://jsd.onmicrosoft.cn/npm/pako@2.1.0/dist/pako.min.js"></script>

<script>
    /** 逻辑部分 (原封不动保留) **/
    const encryptTab = document.getElementById('encryptTab');
    const decryptTab = document.getElementById('decryptTab');
    const encryptFunctions = document.getElementById('encryptFunctions');
    const decryptFunctions = document.getElementById('decryptFunctions');
    const inputText = document.getElementById('inputText');
    const resultText = document.getElementById('resultText');
    const resultStatus = document.getElementById('resultStatus');
    const clearBtn = document.getElementById('clearBtn');
    const copyResultBtn = document.getElementById('copyResultBtn');
    const copySingleBtn = document.getElementById('copySingleBtn');
    const funcBtns = document.querySelectorAll('.func-btn');
    const inputCharCount = document.getElementById('inputCharCount');
    const resultJsonPanel = document.getElementById('resultJsonPanel');
    const resultJsonTree = document.getElementById('resultJsonTree');
    const expandJsonBtn = document.getElementById('expandJsonBtn');
    const collapseJsonBtn = document.getElementById('collapseJsonBtn');
    const LAST_FUNC_STORAGE_KEY = 'codec-last-func';
    let lastSelectedFunc = localStorage.getItem(LAST_FUNC_STORAGE_KEY) || '';
    let autoRunTimer = null;

    // 输入字数统计 (新增辅助)
    inputText.addEventListener('input', () => {
        inputCharCount.textContent = `${inputText.value.length} chars`;
    });

    encryptTab.addEventListener('click', () => {
        encryptTab.className = "flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300 bg-white shadow-md text-primary tab-active";
        decryptTab.className = "flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300 text-gray-400 hover:text-gray-600 hover:bg-white/50";
        
        // 添加淡入淡出效果
        decryptFunctions.classList.add('opacity-0');
        setTimeout(() => {
            decryptFunctions.classList.add('hidden');
            encryptFunctions.classList.remove('hidden');
            setTimeout(() => {
                encryptFunctions.classList.remove('opacity-0');
            }, 50);
        }, 200);
        
        resultStatus.textContent = "模式: 编码";
        resultStatus.classList.replace('text-secondary', 'text-primary');
        resultStatus.classList.add('animate-pulse');
        setTimeout(() => resultStatus.classList.remove('animate-pulse'), 500);
    });

    decryptTab.addEventListener('click', () => {
        decryptTab.className = "flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300 bg-white shadow-md text-secondary tab-active";
        encryptTab.className = "flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300 text-gray-400 hover:text-gray-600 hover:bg-white/50";
        
        // 添加淡入淡出效果
        encryptFunctions.classList.add('opacity-0');
        setTimeout(() => {
            encryptFunctions.classList.add('hidden');
            decryptFunctions.classList.remove('hidden');
            setTimeout(() => {
                decryptFunctions.classList.remove('opacity-0');
            }, 50);
        }, 200);
        
        resultStatus.textContent = "模式: 解码";
        resultStatus.classList.add('text-secondary');
        resultStatus.classList.add('animate-pulse');
        setTimeout(() => resultStatus.classList.remove('animate-pulse'), 500);
    });

    const setResultDisplayMode = (mode) => {
        if (mode === 'tree') {
            resultText.classList.add('hidden');
            resultJsonPanel.classList.remove('hidden');
            return;
        }
        resultText.classList.remove('hidden');
        resultJsonPanel.classList.add('hidden');
    };

    clearBtn.addEventListener('click', () => {
        inputText.value = '';
        resultText.value = '';
        inputCharCount.textContent = '0 chars';
        setResultDisplayMode('text');
        resultJsonTree.innerHTML = '';
        resultStatus.textContent = "内容已清空";
        inputText.focus();
    });

    const copyToClipboard = async () => {
        const value = resultText.value;
        if (!value) {
            resultStatus.textContent = "无内容复制";
            return;
        }
        try {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(value);
            } else {
                const tempTextArea = document.createElement('textarea');
                tempTextArea.value = value;
                tempTextArea.setAttribute('readonly', '');
                tempTextArea.style.position = 'fixed';
                tempTextArea.style.left = '-9999px';
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand('copy');
                document.body.removeChild(tempTextArea);
            }
            const originalText = resultStatus.textContent;
            resultStatus.textContent = "✓ 已成功复制到剪贴板";
            setTimeout(() => { resultStatus.textContent = originalText; }, 2000);
        } catch (e) {
            resultStatus.textContent = "复制失败";
        }
    };

    copyResultBtn.addEventListener('click', copyToClipboard);
    copySingleBtn.addEventListener('click', copyToClipboard);

    const gb2312Codec = (() => {
        let decoder = null;
        let charToHex = null;
        let initError = '';

        const init = () => {
            if (charToHex) return true;
            try {
                decoder = new TextDecoder('gb2312', { fatal: true });
            } catch (e) {
                initError = '当前浏览器不支持GB2312编码';
                return false;
            }
            charToHex = new Map();

            // ASCII 与 GB2312 一致，直接映射。
            for (let byte = 0x00; byte <= 0x7F; byte++) {
                charToHex.set(String.fromCharCode(byte), byte.toString(16).padStart(2, '0').toUpperCase());
            }

            // 构建 GB2312 双字节区反向表（A1-F7, A1-FE）。
            for (let lead = 0xA1; lead <= 0xF7; lead++) {
                for (let trail = 0xA1; trail <= 0xFE; trail++) {
                    try {
                        const decoded = decoder.decode(new Uint8Array([lead, trail]));
                        if (decoded && decoded.length === 1 && decoded !== '\uFFFD' && !charToHex.has(decoded)) {
                            charToHex.set(
                                decoded,
                                `${lead.toString(16).padStart(2, '0')}${trail.toString(16).padStart(2, '0')}`.toUpperCase()
                            );
                        }
                    } catch (e) {
                        // fatal 模式下非法字节会抛错，直接跳过即可。
                    }
                }
            }
            return true;
        };

        const parseHexBytes = (str) => {
            const compact = str.replace(/\s+/g, '');
            if (/^(%[0-9a-fA-F]{2})+$/.test(compact)) {
                return compact.match(/[0-9a-fA-F]{2}/g).map((hex) => parseInt(hex, 16));
            }
            const normalized = str.replace(/0x/gi, '').replace(/[%\s,]+/g, '');
            if (!/^[0-9a-fA-F]+$/.test(normalized) || normalized.length % 2 !== 0) {
                throw new Error('请输入合法十六进制字节（如 B2E2CAD4 / B2 E2 CA D4 / %B2%E2%CA%D4）');
            }
            const bytes = [];
            for (let i = 0; i < normalized.length; i += 2) {
                bytes.push(parseInt(normalized.slice(i, i + 2), 16));
            }
            return bytes;
        };

        return {
            encode: (str) => {
                if (!init()) return initError;
                const bytes = [];
                for (const ch of str) {
                    const hex = charToHex.get(ch);
                    if (!hex) return `GB2312编码失败：包含不支持字符 "${ch}"`;
                    bytes.push(hex);
                }
                return bytes.join(' ');
            },
            decode: (str) => {
                if (!init()) return initError;
                try {
                    const bytes = parseHexBytes(str);
                    return decoder.decode(new Uint8Array(bytes));
                } catch (e) {
                    return `GB2312解码失败：${e.message}`;
                }
            }
        };
    })();

    const codecFunctions = {
        unicodeEncode: (str) => str.split('').map(char => {
            const code = char.charCodeAt(0);
            return code > 127 ? `\\u${code.toString(16).padStart(4, '0')}` : char;
        }).join(''),
        urlEncode: (str) => encodeURIComponent(str),
        utf16Encode: (str) => str.split('').map(char => {
            const code = char.charCodeAt(0);
            return `\\x${code.toString(16).padStart(2, '0')}`;
        }).join(''),
        base64Encode: (str) => btoa(unescape(encodeURIComponent(str))),
        md5Compute: (str) => md5(str),
        hexEncode: (str) => {
            let hex = '';
            for (let i = 0; i < str.length; i++) hex += str.charCodeAt(i).toString(16).padStart(2, '0');
            return hex.toUpperCase();
        },
        sha1Encrypt: (str) => sha1(str),
        htmlNormalEncode: (str) => {
            const escapeMap = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'};
            return str.replace(/[&<>\"']/g, match => escapeMap[match]);
        },
        htmlDeepEncode: (str) => str.split('').map(char => `&#${char.charCodeAt(0)};`).join(''),
        htmlToJs: (str) => str.replace(/[\\'"\n\r\t]/g, match => {
            const escapeMap = {'\\': '\\\\', "'": "\\'", '"': '\\"', '\n': '\\n', '\r': '\\r', '\t': '\\t'};
            return escapeMap[match] || match;
        }),
        gzipCompress: (str) => {
            const uint8Array = new TextEncoder().encode(str);
            const compressed = pako.gzip(uint8Array);
            return btoa(String.fromCharCode.apply(null, compressed));
        },
        unicodeDecode: (str) => str.replace(/\\u([\d\w]{4})/gi, (match, hex) => String.fromCharCode(parseInt(hex, 16))),
        urlDecode: (str) => { try { return decodeURIComponent(str); } catch (e) { return "URL解码失败"; } },
        utf16Decode: (str) => str.replace(/\\x([\d\w]{2})/gi, (match, hex) => String.fromCharCode(parseInt(hex, 16))),
        base64Decode: (str) => { try { return decodeURIComponent(escape(atob(str))); } catch (e) { return "Base64解码失败"; } },
        hexDecode: (str) => {
            try {
                let strClean = str.replace(/\s+/g, '');
                let result = '';
                for (let i = 0; i < strClean.length; i += 2) result += String.fromCharCode(parseInt(strClean.substr(i, 2), 16));
                return result;
            } catch (e) { return "HEX解码失败"; }
        },
        htmlEntityDecode: (str) => {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = str;
            return tempDiv.textContent || tempDiv.innerText;
        },
        urlParamsParse: (str) => {
            try {
                const paramsStr = str.includes('?') ? str.split('?')[1] : str;
                const params = new URLSearchParams(paramsStr);
                let result = '{\n';
                params.forEach((value, key) => { result += `  "${key}": "${value.replace(/"/g, '\\"')}",\n`; });
                return result.slice(0, -2) + '\n}';
            } catch (e) { return "URL参数解析失败"; }
        },
        jwtDecode: (str) => {
            try {
                const parts = str.split('.');
                if (parts.length !== 3) return "无效JWT格式";
                const header = JSON.parse(atob(parts[0].replace(/-/g, '+').replace(/_/g, '/')));
                const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
                return `=== Header ===\n${JSON.stringify(header, null, 2)}\n\n=== Payload ===\n${JSON.stringify(payload, null, 2)}`;
            } catch (e) { return "JWT解码失败"; }
        },
        cookieFormat: (str) => {
            try {
                const cookies = str.split(';').map(c => c.trim());
                let result = '{\n';
                cookies.forEach(c => {
                    const [key, value] = c.split('=');
                    if (key) result += `  "${key}": "${value || ''}",\n`;
                });
                return result.slice(0, -2) + '\n}';
            } catch (e) { return "Cookie格式化失败"; }
        },
        gzipDecompress: (str) => {
            try {
                const binary = atob(str);
                const uint8Array = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) uint8Array[i] = binary.charCodeAt(i);
                return pako.ungzip(uint8Array, { to: 'string' });
            } catch (e) { return "Gzip解压失败"; }
        },
        gb2312Encode: (str) => gb2312Codec.encode(str),
        gb2312Decode: (str) => gb2312Codec.decode(str)
    };

    const decodeFunctionNames = new Set([
        'unicodeDecode',
        'urlDecode',
        'utf16Decode',
        'base64Decode',
        'hexDecode',
        'htmlEntityDecode',
        'urlParamsParse',
        'jwtDecode',
        'cookieFormat',
        'gzipDecompress',
        'gb2312Decode'
    ]);

    const formatJsonIfNeeded = (result, funcName) => {
        if (!decodeFunctionNames.has(funcName) || typeof result !== 'string') return result;
        const trimmed = result.trim();
        if (!trimmed) return result;
        try {
            const parsed = JSON.parse(trimmed);
            return JSON.stringify(parsed, null, 4);
        } catch (e) {
            // 非 JSON 保持原样
        }
        return result;
    };

    const escapeHtml = (text) => String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const formatPrimitive = (value) => {
        if (typeof value === 'string') return `<span class="fe-string">"${escapeHtml(value)}"</span>`;
        if (typeof value === 'number') return `<span class="fe-number">${value}</span>`;
        if (typeof value === 'boolean') return `<span class="fe-boolean">${value}</span>`;
        if (value === null) return `<span class="fe-null">null</span>`;
        return '';
    };

    const buildTreeHtml = (obj, parentPath = []) => {
        let html = '';
        const currentPath = parentPath.join('.');
        if (Array.isArray(obj)) {
            const count = obj.length;
            html += `<span class="fe-bracket">[</span> `;
            html += `<span class="fe-toggle" data-path="${currentPath}">▼</span>`;
            html += `<span class="fe-collapse-note text-gray-400 text-xs" data-path="${currentPath}" style="display:none">(${count} 项)</span>`;
            html += `<div class="fe-tree-children" data-path="${currentPath}" style="display:block;">`;
            obj.forEach((item, index) => {
                const path = [...parentPath, `arr_${index}`];
                html += `<div style="padding-left: 20px;">`;
                html += `<span class="fe-key">[${index}]</span>: `;
                html += typeof item === 'object' && item !== null ? buildTreeHtml(item, path) : formatPrimitive(item);
                html += index < count - 1 ? `<span class="fe-bracket">,</span>` : '';
                html += `</div>`;
            });
            html += `</div><span class="fe-bracket">]</span>`;
            return html;
        }

        if (typeof obj === 'object' && obj !== null) {
            const keys = Object.keys(obj);
            const count = keys.length;
            html += `<span class="fe-bracket">{</span> `;
            html += `<span class="fe-toggle" data-path="${currentPath}">▼</span>`;
            html += `<span class="fe-collapse-note text-gray-400 text-xs" data-path="${currentPath}" style="display:none">(${count} 属性)</span>`;
            html += `<div class="fe-tree-children" data-path="${currentPath}" style="display:block;">`;
            keys.forEach((key, index) => {
                const value = obj[key];
                const path = [...parentPath, key.replace(/\W/g, '_')];
                html += `<div style="padding-left: 20px;">`;
                html += `<span class="fe-key">"${escapeHtml(key)}"</span>: `;
                html += typeof value === 'object' && value !== null ? buildTreeHtml(value, path) : formatPrimitive(value);
                html += index < count - 1 ? `<span class="fe-bracket">,</span>` : '';
                html += `</div>`;
            });
            html += `</div><span class="fe-bracket">}</span>`;
            return html;
        }

        return formatPrimitive(obj);
    };

    const bindTreeToggleEvents = () => {
        resultJsonTree.querySelectorAll('.fe-toggle').forEach((toggle) => {
            toggle.onclick = function () {
                const path = this.getAttribute('data-path');
                const children = resultJsonTree.querySelector(`.fe-tree-children[data-path="${path}"]`);
                const note = resultJsonTree.querySelector(`.fe-collapse-note[data-path="${path}"]`);
                if (!children || !note) return;
                const isExpanded = this.textContent === '▼';
                this.textContent = isExpanded ? '▶' : '▼';
                children.style.display = isExpanded ? 'none' : 'block';
                note.style.display = isExpanded ? 'inline' : 'none';
            };
        });
    };

    const renderResultJsonTree = (jsonText, funcName) => {
        if (!decodeFunctionNames.has(funcName)) {
            setResultDisplayMode('text');
            resultJsonTree.innerHTML = '';
            return;
        }
        try {
            const parsed = JSON.parse(jsonText);
            if (typeof parsed !== 'object' || parsed === null) {
                setResultDisplayMode('text');
                resultJsonTree.innerHTML = '';
                return;
            }
            resultJsonTree.innerHTML = buildTreeHtml(parsed);
            bindTreeToggleEvents();
            setResultDisplayMode('tree');
        } catch (e) {
            setResultDisplayMode('text');
            resultJsonTree.innerHTML = '';
        }
    };

    const setAllTreeNodes = (expanded) => {
        resultJsonTree.querySelectorAll('.fe-toggle').forEach((toggle) => {
            const path = toggle.getAttribute('data-path');
            const children = resultJsonTree.querySelector(`.fe-tree-children[data-path="${path}"]`);
            const note = resultJsonTree.querySelector(`.fe-collapse-note[data-path="${path}"]`);
            if (!children || !note) return;
            toggle.textContent = expanded ? '▼' : '▶';
            children.style.display = expanded ? 'block' : 'none';
            note.style.display = expanded ? 'none' : 'inline';
        });
    };

    expandJsonBtn.addEventListener('click', () => setAllTreeNodes(true));
    collapseJsonBtn.addEventListener('click', () => setAllTreeNodes(false));

    const applyBtnActiveStyle = (activeBtn) => {
        funcBtns.forEach(b => b.classList.remove('bg-primary-light', 'border-primary/20', 'scale-95'));
        if (!activeBtn) return;
        activeBtn.classList.add('bg-primary-light', 'border-primary/20', 'scale-95');
        setTimeout(() => activeBtn.classList.remove('scale-95'), 200);
    };

    const runCodec = (funcName, options = {}) => {
        const { fromInput = false } = options;
        const targetBtn = document.querySelector(`.func-btn[data-func="${funcName}"]`);
        const func = codecFunctions[funcName];
        if (!targetBtn || typeof func !== 'function') return;

        const inputValue = inputText.value.trim();
        applyBtnActiveStyle(targetBtn);

        if (!inputValue) {
            if (fromInput) {
                resultText.value = '';
                setResultDisplayMode('text');
                resultJsonTree.innerHTML = '';
                resultStatus.textContent = "等待输入...";
                return;
            }
            resultStatus.textContent = "⚠ 请输入内容";
            resultStatus.classList.add('text-warning', 'animate-pulse');
            setTimeout(() => resultStatus.classList.remove('text-warning', 'animate-pulse'), 1000);
            resultText.value = '';
            setResultDisplayMode('text');
            resultJsonTree.innerHTML = '';
            return;
        }

        setResultDisplayMode('text');
        resultStatus.textContent = "处理中...";
        resultStatus.classList.add('animate-pulse', 'text-primary');
        resultText.value = "正在处理，请稍候...";

        setTimeout(() => {
            try {
                const result = formatJsonIfNeeded(func(inputValue), funcName);
                resultText.classList.add('opacity-0');
                setTimeout(() => {
                    resultText.value = result;
                    renderResultJsonTree(result, funcName);
                    resultText.classList.remove('opacity-0');
                }, 100);

                resultStatus.textContent = `成功: ${targetBtn.textContent.trim()}`;
                resultStatus.classList.remove('animate-pulse');
                resultStatus.classList.add('text-success');
                setTimeout(() => resultStatus.classList.remove('text-success'), 1500);
            } catch (e) {
                resultText.value = `执行出错: ${e.message}`;
                setResultDisplayMode('text');
                resultJsonTree.innerHTML = '';
                resultStatus.textContent = "执行出错";
                resultStatus.classList.remove('animate-pulse');
                resultStatus.classList.add('text-danger');
                setTimeout(() => resultStatus.classList.remove('text-danger'), 1500);
            }
        }, 300);
    };

    funcBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const funcName = btn.getAttribute('data-func');
            lastSelectedFunc = funcName;
            localStorage.setItem(LAST_FUNC_STORAGE_KEY, funcName);
            runCodec(funcName);
        });
    });

    inputText.addEventListener('input', () => {
        if (!lastSelectedFunc) return;
        if (autoRunTimer) clearTimeout(autoRunTimer);
        autoRunTimer = setTimeout(() => {
            runCodec(lastSelectedFunc, { fromInput: true });
        }, 250);
    });

    if (lastSelectedFunc && codecFunctions[lastSelectedFunc]) {
        const decodeSet = decodeFunctionNames;
        if (decodeSet.has(lastSelectedFunc)) {
            decryptTab.click();
        } else {
            encryptTab.click();
        }
        applyBtnActiveStyle(document.querySelector(`.func-btn[data-func="${lastSelectedFunc}"]`));
    }
</script>
</body>
</html>
